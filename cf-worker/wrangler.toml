name = "brazil-quiz"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Static site (the quiz). public/index.html is a copy of ../quiz.html
assets = { directory = "./public", binding = "ASSETS" }

# Shared-vote storage. Create with:
#   wrangler kv namespace create VOTES
# then paste the printed id below.
[[kv_namespaces]]
binding = "VOTES"
id = "35b1c8fbc2d94d16beba18721ff24b94"
